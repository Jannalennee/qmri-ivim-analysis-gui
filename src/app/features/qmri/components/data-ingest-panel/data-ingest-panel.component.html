<article class="panel" aria-labelledby="ingest-title">
  <h2 id="ingest-title">Data Ingest</h2>
  <p class="helper">Load a DICOM or NIfTI scan to start the qMRI workflow.</p>

  <label for="scan-upload" class="upload-label">Select scan file</label>
  <input
    id="scan-upload"
    type="file"
    accept=".dcm,.dicom,.nii,.nii.gz"
    (change)="onFileInput($event)"
  />

  <p class="ingest-message">{{ ingestMessage() }}</p>

  @if (selectedScan(); as scan) {
    <dl class="scan-metadata">
      <div>
        <dt>Name</dt>
        <dd>{{ scan.fileName }}</dd>
      </div>
      <div>
        <dt>Format</dt>
        <dd>{{ scan.format | uppercase }}</dd>
      </div>
      <div>
        <dt>Size</dt>
        <dd>{{ scan.sizeMb }} MB</dd>
      </div>
    </dl>
  }
</article>
