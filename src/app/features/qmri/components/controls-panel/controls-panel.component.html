<article class="panel" aria-labelledby="controls-title">
  <h2 id="controls-title">Interactive Controls</h2>
  <button type="button" class="preset" (click)="applyRecommendedSettings()">
    Apply recommended settings for selected model
  </button>

  <label for="threshold">Confidence threshold: {{ confidenceThreshold().toFixed(2) }}</label>
  <input
    id="threshold"
    type="range"
    min="0.5"
    max="0.99"
    step="0.01"
    [value]="confidenceThreshold()"
    (input)="onThresholdInput($event)"
  />

  <label for="opacity">Overlay opacity: {{ overlayOpacity() }}%</label>
  <input
    id="opacity"
    type="range"
    min="10"
    max="100"
    step="1"
    [value]="overlayOpacity()"
    (input)="onOpacityInput($event)"
  />

  @if (selectedModel() === 'ivimnet') {
    <div class="model-group">
      <h3>IVIMNET Parameters</h3>
      <label for="ivim-bmax">Max b-value: {{ ivimBMax() }}</label>
      <input
        id="ivim-bmax"
        type="range"
        min="200"
        max="1500"
        step="50"
        [value]="ivimBMax()"
        (input)="onIvimBMaxInput($event)"
      />

      <label for="ivim-reg">Regularization: {{ ivimRegularization().toFixed(2) }}</label>
      <input
        id="ivim-reg"
        type="range"
        min="0"
        max="1"
        step="0.01"
        [value]="ivimRegularization()"
        (input)="onIvimRegularizationInput($event)"
      />
    </div>
  }

  @if (selectedModel() === 'ncde-qmri') {
    <div class="model-group">
      <h3>NCDE-QMRI Parameters</h3>
      <label for="ncde-timesteps">Time steps: {{ ncdeTimeSteps() }}</label>
      <input
        id="ncde-timesteps"
        type="range"
        min="8"
        max="64"
        step="1"
        [value]="ncdeTimeSteps()"
        (input)="onNcdeTimeStepsInput($event)"
      />

      <label for="ncde-hidden">Hidden size: {{ ncdeHiddenSize() }}</label>
      <input
        id="ncde-hidden"
        type="range"
        min="16"
        max="256"
        step="8"
        [value]="ncdeHiddenSize()"
        (input)="onNcdeHiddenSizeInput($event)"
      />
    </div>
  }

  @if (showAdvancedControls()) {
    <label for="smoothing">Smoothing kernel: {{ smoothingLevel() }}</label>
    <input
      id="smoothing"
      type="range"
      min="0"
      max="6"
      step="1"
      [value]="smoothingLevel()"
      (input)="onSmoothingInput($event)"
    />
  }

  <button type="button" class="toggle" (click)="toggleUncertainty()">
    @if (showUncertaintyOverlay()) {
      Hide uncertainty overlay
    } @else {
      Show uncertainty overlay
    }
  </button>
</article>
